spring:
  application:
    name: professional-oms-bd

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:omsdb}
    username: ${POSTGRES_USER:omsuser}
    password: ${POSTGRES_PASSWORD:omspass}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: OmsHikariPool
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    date-format: yyyy-MM-dd'T'HH:mm:ss
    time-zone: Asia/Dhaka
    default-property-inclusion: non_null

server:
  port: 8080
  servlet:
    context-path: /

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

logging:
  level:
    com.demo.oms: INFO
    quickfix: WARN
    org.springframework.web.socket: WARN
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

fix:
  host: ${FIX_HOST:localhost}
  port: ${FIX_PORT:9878}

security:
  jwt:
    enabled: true
    secret: ${JWT_SECRET:oms-bd-professional-jwt-secret-key-2026-must-be-32-chars-min-please-change-in-production}
    expiration-ms: 86400000   # 24 hours

# Bangladesh market configuration
market:
  # TESTING ONLY: set to true to enforce Sun-Thu 10:00-14:30 BST trading hours
  hours:
    enabled: false
  timezone: Asia/Dhaka
  currency: BDT
  settlement-days: 2
  exchanges:
    dse:
      name: Dhaka Stock Exchange
      code: DSE
      mic: XDSE
    cse:
      name: Chittagong Stock Exchange
      code: CSE
      mic: XCHG
