spring:
  datasource:
    url: jdbc:h2:mem:omsdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
  h2:
    console:
      enabled: false

security:
  jwt:
    enabled: false

market:
  hours:
    enabled: false
